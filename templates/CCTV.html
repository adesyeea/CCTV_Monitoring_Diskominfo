<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>CCTV - Dashboard Monitoring</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 200px;
      background-color: #2c3e50;
      color: white;
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }

    .sidebar a {
      padding: 15px 20px;
      text-decoration: none;
      color: white;
      display: block;
    }

    .sidebar a:hover, .sidebar a.active {
      background-color: #34495e;
    }

    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    h2 { color: #2c3e50; }

    .video-box {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .video-box video {
      border: 2px solid #333;
      width: 100%;
      max-width: 720px;
      border-radius: 6px;
    }

    .analysis {
      border-top: 2px solid #ccc;
      padding-top: 15px;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 120px;
      padding: 15px;
      border-radius: 8px;
      color: white;
      text-align: center;
    }

    .masuk  { background-color: #27ae60; }
    .keluar { background-color: #e74c3c; }
    .total  { background-color: #2980b9; }

    .card .label { font-size: 14px; margin-bottom: 6px; }
    .card .value { font-size: 32px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="sidebar">
    <a href="/">Dashboard</a>
    <a href="/cctv" class="active">CCTV</a>
    <a href="/analisis">Analisis</a>
  </div>

  <div class="content">
    <h2>📹 Live Streaming CCTV</h2>

    <div class="video-box">
      <video id="video" controls autoplay muted></video>
    </div>

    <div class="analysis">
      <h3>🚦 Statistik Kendaraan</h3>

      <div class="stats">
        <div class="card masuk">
          <div class="label">Masuk</div>
          <div class="value" id="masuk">-</div>
        </div>
        <div class="card keluar">
          <div class="label">Keluar</div>
          <div class="value" id="keluar">-</div>
        </div>
        <div class="card total">
          <div class="label">Total</div>
          <div class="value" id="total">-</div>
        </div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const HLS_URL = "https://cctv.jogjaprov.go.id/cctv-proxy/atcs/Prambanan_TC.stream/playlist.m3u8";
const video = document.getElementById('video');

if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource(HLS_URL);
  hls.attachMedia(video);
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = HLS_URL;
}

async function loadStats() {
  try {
    const res = await fetch("http://127.0.0.1:5000/api/traffic");
    const data = await res.json();
    if (data.status !== "success") return;
    let masuk = 0, keluar = 0;
    // device_id di database adalah string (mis. "CCTV"), jumlahkan semua
    data.data.forEach(item => {
      masuk  += Number(item.masuk)  || 0;
      keluar += Number(item.keluar) || 0;
    });
    document.getElementById("masuk").innerText  = masuk;
    document.getElementById("keluar").innerText = keluar;
    document.getElementById("total").innerText  = masuk + keluar;
  } catch (err) {
    console.error("Error:", err);
  }
}

loadStats();
setInterval(loadStats, 5000);
</script>

</body>
</html>
