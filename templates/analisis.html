<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Analisis CCTV</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial;
            margin: 0;
            background: #f5f6fa;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 200px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .sidebar a {
            padding: 15px 20px;
            text-decoration: none;
            color: white;
            display: block;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: #34495e;
        }

        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        h1 { text-align: center; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }
    </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <a href="/">Dashboard</a>
    <a href="/cctv">CCTV</a>
    <a href="/analisis" class="active">Analisis</a>
  </div>

  <!-- Konten -->
  <div class="content">

<h1>📊 Dashboard Analisis CCTV</h1>

<div class="grid">
    <div class="card">
        <h3>Total Object</h3>
        <canvas id="objekChart"></canvas>
    </div>

    <div class="card">
        <h3>Per Hari</h3>
        <canvas id="harianChart"></canvas>
    </div>

    <div class="card">
        <h3>Per CCTV</h3>
        <canvas id="cctvChart"></canvas>
    </div>

    <div class="card">
        <h3>Distribusi Object</h3>
        <canvas id="distribusiChart"></canvas>
    </div>

    <div class="card">
        <h3>Per Jam</h3>
        <canvas id="jamChart"></canvas>
    </div>

    <div class="card">
        <h3>Jam Puncak CCTV</h3>
        <canvas id="puncakChart"></canvas>
    </div>

    <div class="card">
        <h3>Masuk vs Keluar</h3>
        <canvas id="masukKeluarChart"></canvas>
    </div>
</div>

<script>
const API = "http://127.0.0.1:5000/api";

// =========================
// HELPER FETCH
// =========================
async function getData(url) {
    const res = await fetch(url);
    return res.json();
}

// =========================
// 1. OBJEK
// =========================
getData(`${API}/analisis_objek`).then(res => {
    new Chart(document.getElementById('objekChart'), {
        type: 'bar',
        data: {
            labels: res.labels,
            datasets: [{
                label: 'Jumlah',
                data: res.values
            }]
        }
    });
});

// =========================
// 2. HARIAN
// =========================
getData(`${API}/analisis_harian`).then(res => {
    new Chart(document.getElementById('harianChart'), {
        type: 'line',
        data: {
            labels: res.labels,
            datasets: [{
                label: 'Total',
                data: res.values
            }]
        }
    });
});

// =========================
// 3. CCTV
// =========================
getData(`${API}/analisis_cctv`).then(res => {
    new Chart(document.getElementById('cctvChart'), {
        type: 'bar',
        data: {
            labels: res.labels,
            datasets: [{
                label: 'Jumlah',
                data: res.values
            }]
        }
    });
});

// =========================
// 4. DISTRIBUSI
// =========================
getData(`${API}/analisis_distribusi`).then(res => {
    new Chart(document.getElementById('distribusiChart'), {
        type: 'bar',
        data: {
            labels: res.labels,
            datasets: res.datasets
        }
    });
});

// =========================
// 5. PER JAM
// =========================
getData(`${API}/analisis_perjam`).then(res => {
    new Chart(document.getElementById('jamChart'), {
        type: 'line',
        data: {
            labels: res.labels,
            datasets: [{
                label: 'Jumlah',
                data: res.values
            }]
        }
    });
});

// =========================
// 6. JAM PUNCAK
// =========================
getData(`${API}/analisis_jam_puncak`).then(res => {
    new Chart(document.getElementById('puncakChart'), {
        type: 'line',
        data: {
            labels: res.labels,
            datasets: res.datasets
        }
    });
});

// =========================
// 7. MASUK KELUAR
// =========================
getData(`${API}/analisis_masuk_keluar`).then(res => {
    new Chart(document.getElementById('masukKeluarChart'), {
        type: 'pie',
        data: {
            labels: res.labels,
            datasets: [{
                data: res.values
            }]
        }
    });
});
</script>

  </div>

</body>
</html>
