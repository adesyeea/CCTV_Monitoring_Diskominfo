<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard CCTV</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Segoe UI; background:#f4f6f9; }
.sidebar {
    width:220px; background:#2c3e50; color:white;
    height:100vh; position:fixed; padding:20px;
}
.sidebar a {
    color:white; display:block; margin:10px 0;
    text-decoration:none;
}
.sidebar a:hover { color:#1abc9c; }

.content {
    margin-left:220px; padding:20px;
}

.card {
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h5>Dashboard</h5>
    <a href="#" onclick="showPage('home')">Dashboard</a>
    <a href="#" onclick="showPage('cctv1')">CCTV 1</a>
    <a href="#" onclick="showPage('cctv2')">CCTV 2</a>
    <a href="#" onclick="showPage('analysis')">Analisis</a>
</div>

<div class="content">

    <!-- DASHBOARD -->
    <div id="homePage">
        <div class="text-center mt-5">
            <h3>SELAMAT DATANG DI DASHBOARD MONITORING CCTV</h3>
            <p class="mt-3">
                Sistem Monitoring & Analitik CCTV<br><br>
                • Live streaming CCTV<br>
                • Analisis data kendaraan<br>
                • Monitoring realtime
            </p>
        </div>
    </div>

    <!-- CCTV 1 -->
    <div id="cctv1Page" style="display:none;">
        <h4>CCTV 1</h4>
        <video width="100%" controls autoplay muted>
            <source src="https://cctv.jogjaprov.go.id/cctv-proxy/atcs/DemenGlagah_TC.stream/playlist.m3u8">
        </video>
    </div>

    <!-- CCTV 2 -->
    <div id="cctv2Page" style="display:none;">
        <h4>CCTV 2</h4>
        <video width="100%" controls autoplay muted>
            <source src="https://cctv.jogjaprov.go.id/cctv-proxy/atcs/Prambanan_TC.stream/playlist.m3u8">
        </video>
    </div>

    <!-- ANALISIS -->
    <div id="analysisPage" style="display:none;">
        <h4>Analisis Data CCTV</h4>

        <div class="row mt-4">
            <div class="col-md-6"><canvas id="barChart"></canvas></div>
            <div class="col-md-6"><canvas id="pieChart"></canvas></div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12"><canvas id="lineChart"></canvas></div>
        </div>
    </div>

</div>

<script>
function showPage(page) {
    ['home','cctv1','cctv2','analysis'].forEach(p=>{
        document.getElementById(p+'Page').style.display='none';
    });
    document.getElementById(page+'Page').style.display='block';
}

let barChart, pieChart, lineChart;

async function fetchData() {
    const res = await fetch('http://127.0.0.1:5000/api/traffic');
    const json = await res.json();

    if(json.status !== "success") return;

    let totalMasuk=0, totalKeluar=0;
    let kendaraan = {car:0, motorcycle:0, bus:0, truck:0};

    json.data.forEach(d=>{
        kendaraan[d.object] += parseInt(d.masuk)+parseInt(d.keluar);
        totalMasuk += parseInt(d.masuk);
        totalKeluar += parseInt(d.keluar);
    });

    updateCharts(kendaraan, totalMasuk, totalKeluar);
}

function updateCharts(kendaraan, masuk, keluar) {

    const labels = ["Mobil","Motor","Bus","Truk"];
    const values = [
        kendaraan.car,
        kendaraan.motorcycle,
        kendaraan.bus,
        kendaraan.truck
    ];

    // BAR
    if(!barChart){
        barChart = new Chart(barChartEl, {
            type:'bar',
            data:{labels:labels,datasets:[{data:values}]}
        });
    } else {
        barChart.data.datasets[0].data = values;
        barChart.update();
    }

    // PIE
    if(!pieChart){
        pieChart = new Chart(pieChartEl, {
            type:'pie',
            data:{
                labels:["Masuk","Keluar"],
                datasets:[{data:[masuk,keluar]}]
            }
        });
    } else {
        pieChart.data.datasets[0].data = [masuk,keluar];
        pieChart.update();
    }

    // LINE (dummy realtime)
    if(!lineChart){
        lineChart = new Chart(lineChartEl,{
            type:'line',
            data:{
                labels:["1","2","3","4","5"],
                datasets:[{data:[masuk,keluar,masuk,keluar,masuk]}]
            }
        });
    }
}

const barChartEl = document.getElementById('barChart');
const pieChartEl = document.getElementById('pieChart');
const lineChartEl = document.getElementById('lineChart');
setInterval(fetchData,3000);
fetchData();
</script>

</body>
</html>
